name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Install tools
        run: make tools

      - name: Format check
        run: make fmt-check

      - name: Vet
        run: make vet

      - name: Lint (golangci-lint with staticcheck, gosec, depguard)
        run: make lint

      - name: Vulnerability scan (govulncheck)
        run: make vuln

      - name: Test (race + coverage)
        run: make test

      - name: Build
        run: make build
